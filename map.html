<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad Dad Brewing Co. — Where We Pour</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a1a;
      color: #fff;
    }

    header {
      background: #1a1a1a;
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #F4623A;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      color: #fff;
    }

    header h1 span {
      color: #F4623A;
    }

    #count-badge {
      background: #F4623A;
      color: #fff;
      font-weight: 700;
      font-size: 0.85rem;
      padding: 5px 14px;
      border-radius: 20px;
      letter-spacing: 0.04em;
    }

    #map {
      width: 100%;
      height: calc(100vh - 62px);
    }

    /* Info window override */
    .gm-style .gm-style-iw-c {
      background: #1a1a1a !important;
      border-radius: 10px !important;
      padding: 0 !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5) !important;
    }
    .gm-style .gm-style-iw-d {
      overflow: hidden !important;
    }
    .gm-style .gm-style-iw-tc::after {
      background: #1a1a1a !important;
    }
    .gm-style .gm-style-iw button[title="Close"] img {
      filter: invert(1);
    }

    .info-box {
      padding: 14px 18px;
      min-width: 160px;
    }
    .info-box .biz-name {
      font-weight: 700;
      font-size: 1rem;
      color: #fff;
      margin-bottom: 4px;
    }
    .info-box .biz-city {
      font-size: 0.85rem;
      color: #aaa;
    }
    .info-box .biz-items {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #ccc;
      line-height: 1.5;
    }
    .info-box .biz-items span {
      display: block;
      padding-left: 10px;
      position: relative;
    }
    .info-box .biz-items span::before {
      content: "🍺";
      position: absolute;
      left: -4px;
      font-size: 0.7rem;
      top: 2px;
    }
  </style>
</head>
<body>

<header>
  <h1>Bad Dad Brewing Co. <span>— Where We Pour</span></h1>
  <div id="count-badge">Loading...</div>
</header>

<div id="map"></div>

<script>
  let map, infoWindow;

  function initMap() {
    map = new google.maps.Map(document.getElementById("map"), {
      center: { lat: 40.2, lng: -86.5 },
      zoom: 7,
      styles: [
        { elementType: "geometry", stylers: [{ color: "#212121" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#212121" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
        { featureType: "administrative", elementType: "geometry", stylers: [{ color: "#757575" }] },
        { featureType: "administrative.country", elementType: "labels.text.fill", stylers: [{ color: "#9e9e9e" }] },
        { featureType: "administrative.locality", elementType: "labels.text.fill", stylers: [{ color: "#bdbdbd" }] },
        { featureType: "poi", elementType: "labels.text.fill", stylers: [{ color: "#757575" }] },
        { featureType: "poi.park", elementType: "geometry", stylers: [{ color: "#181818" }] },
        { featureType: "poi.park", elementType: "labels.text.fill", stylers: [{ color: "#616161" }] },
        { featureType: "road", elementType: "geometry.fill", stylers: [{ color: "#2c2c2c" }] },
        { featureType: "road", elementType: "labels.text.fill", stylers: [{ color: "#8a8a8a" }] },
        { featureType: "road.arterial", elementType: "geometry", stylers: [{ color: "#373737" }] },
        { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#3c3c3c" }] },
        { featureType: "road.highway.controlled_access", elementType: "geometry", stylers: [{ color: "#4e4e4e" }] },
        { featureType: "transit", elementType: "geometry", stylers: [{ color: "#2f3948" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#000000" }] },
        { featureType: "water", elementType: "labels.text.fill", stylers: [{ color: "#3d3d3d" }] }
      ],
      mapTypeControl: false,
      streetViewControl: false,
      fullscreenControl: true,
    });

    infoWindow = new google.maps.InfoWindow();

    // Load locations.json
    fetch("locations.json?_=" + Date.now())
      .then(r => r.json())
      .then(data => {
        const locs = data.locations || [];
        document.getElementById("count-badge").textContent =
          locs.length + " locations";

        const bounds = new google.maps.LatLngBounds();

        locs.forEach(loc => {
          const pos = { lat: loc.lat, lng: loc.lng };

          const marker = new google.maps.Marker({
            position: pos,
            map: map,
            title: loc.name,
            icon: {
              path: google.maps.SymbolPath.CIRCLE,
              scale: 8,
              fillColor: "#F4623A",
              fillOpacity: 0.92,
              strokeColor: "#fff",
              strokeWeight: 1.5,
            }
          });

          marker.addListener("click", () => {
            const items = (loc.recent_items || []).slice(0, 3);
            const itemsHtml = items.length
              ? `<div class="biz-items">${items.map(i => `<span>${escHtml(i)}</span>`).join('')}</div>`
              : '';
            infoWindow.setContent(`
              <div class="info-box">
                <div class="biz-name">${escHtml(loc.name)}</div>
                <div class="biz-city">${escHtml(loc.city)}, ${escHtml(loc.state)}</div>
                ${itemsHtml}
              </div>
            `);
            infoWindow.open(map, marker);
          });

          bounds.extend(pos);
        });

        if (locs.length > 0) map.fitBounds(bounds);
      })
      .catch(err => {
        console.error("Failed to load locations.json:", err);
        document.getElementById("count-badge").textContent = "Error loading data";
      });
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }
</script>

<script
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAaK-E2uqPScAwS2IvigsdCoTdtNEu08UE&callback=initMap"
  async defer>
</script>

</body>
</html>
